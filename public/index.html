<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>분당구 개표 흐름 대시보드</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link rel="stylesheet" href="./styles.css?v=20260604g" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">제9회 전국동시지방선거</p>
        <h1>분당구 개표 흐름 <span id="bundangRateInline" class="header-rate"></span></h1>
      </div>
      <div class="topbar__meta">
        <span id="updatedAt">데이터 확인 중</span>
        <a id="sourceLink" href="https://info.nec.go.kr/main/showDocument.xhtml?electionId=0020260603&topMenuId=VC&secondMenuId=VCCP08" target="_blank" rel="noreferrer">NEC 원문</a>
      </div>
    </header>

    <main>

      <section class="panel" aria-label="선거별 현황">
        <div class="section-title">
          <div>
            <p class="eyebrow">Races</p>
            <h2>선거별 현황</h2>
          </div>
          <div class="legend">
            <span><i class="dot dot--early"></i>관내사전</span>
            <span><i class="dot dot--day"></i>선거일</span>
            <span><i class="dot dot--outside"></i>관외사전</span>
            <span><i class="dot dot--residence"></i>거소투표</span>
          </div>
        </div>
        <div id="raceGrid" class="race-grid"></div>
      </section>

      <section class="panel" aria-label="국회의원선거 전체">
        <div class="section-title">
          <div>
            <p class="eyebrow">National Assembly</p>
            <h2>국회의원선거 전체 선거구</h2>
          </div>
          <p class="muted">해당 선거가 열린 모든 선거구를 자동 탐색합니다.</p>
        </div>
        <div id="nationalList" class="unit-list"></div>
      </section>
    </main>

    <footer>
      <p>자료 출처: 중앙선거관리위원회 선거통계시스템. 로컬 스크립트가 120초마다 데이터를 수집합니다.</p>
    </footer>

    <template id="raceCardTemplate">
      <details class="race-card">
        <summary class="race-card__summary-header">
          <div class="race-card__head">
            <div>
              <span class="race-card__scope"></span>
              <h3></h3>
            </div>
            <div class="race-card__head-right">
              <span class="race-card__rate"></span>
              <span class="race-card__toggle-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M6 9l6 6 6-6"/>
                </svg>
              </span>
            </div>
          </div>
          <div class="progress"><span></span></div>
        </summary>
        <div class="race-card__content">
          <div class="race-card__summary"></div>
          <div class="chips"></div>
          <div class="ballot-bars"></div>
          <div class="candidate-list"></div>
        </div>
      </details>
    </template>

    <script src="./app.js?v=20260604g" type="module"></script>
  </body>
</html>
